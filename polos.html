<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POLOS | IMPERIAL DESIGN</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
<header>
    <nav class="navbar">
        <div class="logo">IMPERIAL <span>DESIGN</span></div>
        <ul class="nav-links">
            <li><a href="INDEX.HTML">INICIO</a></li>
            <li><a href="sudaderas.html">SUDADERAS</a></li>
            <li><a href="playeras.html">PLAYERAS</a></li>
            <li><a href="camisetas.html">CAMISETAS</a></li>
            <li><a href="pantalones.html">PANTALONES</a></li>
            <li><a href="polos.html" class="active">POLOS</a></li>
            <li><a href="sneakers.html">SNEAKERS</a></li>
        </ul>
    </nav>
</header>
<section class="products" id="polos">
    <h2>POLOS</h2>
    <div class="grid" id="grid-polos"></div>
</section>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/supabase.min.js"></script>
<script>
const SUPABASE_URL = 'https://pyuqebokjhtwyrojwgxd.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_IUyaOWBuDvTAURD92VCxQQ_AGQN1-pw';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
async function loadPolos() {
    const { data, error } = await supabase
        .from('productos')
        .select('*')
        .eq('categoria', 'polos');
    if (error) {
        console.error('Error fetching polos:', error);
        return;
    }
    const grid = document.getElementById('grid-polos');
    grid.innerHTML = '';
    data.forEach(prod => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <img src="${prod.imagen}" alt="${prod.nombre}">
            <h3>${prod.nombre}</h3>
            <p>${prod.descripcion}</p>
            <p><strong>$${prod.precio}</strong></p>
            <p><strong>Código:</strong> ${prod.codigo}</p>
            <p><strong>Talla:</strong> ${prod.talla}</p>
            <p><strong>Color:</strong> ${prod.color}</p>
            <button>AGREGAR AL CARRITO</button>
        `;
        grid.appendChild(card);
    });
}
window.addEventListener('DOMContentLoaded', loadPolos);
</script>
</body>
</html>
